<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
</head>
<body>
  <h1>Contact Form</h1>
  <form id="leadForm">
    <input type="text" id="name" placeholder="Your Name" required><br><br>
    <input type="email" id="email" placeholder="Your Email" required><br><br>
    <input type="text" id="phone" placeholder="Your Phone" required><br><br>
    <button type="submit">Submit</button>
  </form>
  <p id="msg"></p>
  <script>
    document.getElementById('leadForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value
      };
      await fetch('https://n8n-4vfs.onrender.com/webhook-test/lead-capture', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      document.getElementById('msg').innerText = 'Thank you! We will contact you soon.';
    });
  </script>
</body>
</html>
